.shell{

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:12px;

.logoBtn{

  background:none;
  border:none;
  padding:0;
  margin:0;
  cursor:pointer;

}
.logoBtn:hover .title{

.title{

  font-size:24px;
  letter-spacing:-0.4px;
}
.meta{
  font-size:13px;
  color:var(--muted);
}
.progress{
  height:8px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:24px;
  border:1px solid #dbe1ea;
}
.progress > div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #60a5fa, #2563eb);
  transition:width .2s ease;
}

/* stage */
.stage{
  position:relative;
  height:600px;
}
.card{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  gap:14px;
  user-select:none;
  touch-action:pan-y;
  transition:transform .18s ease;
  overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:8px;
  background:linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
}
.card.back{
  transform:scale(.97) translateY(10px);
  background:linear-gradient(180deg, #f3f7ff 0%, #eef4ff 100%);
  opacity:.86;
}

.cardTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-top:4px;
}
.pill{
  font-size:12px;
  color:var(--muted);

  border-radius:999px;
  background:#fff;

}
.categoryLabel{

}
.prompt{

  line-height:1.18;

}
.actionBox{
  border:1px solid #dbeafe;

  padding:16px;
  display:grid;
  gap:8px;

.actionTitle{

  color:var(--muted);
}
.actionText{

}
.instructions{

  border:1px solid var(--border);
  border-radius:18px;
  padding:14px 16px;
}
.instructions ul{
  margin:10px 0 0 18px;

}
.instructions li{
  margin:7px 0;
}

/* choices */

  margin-top:auto;
  display:grid;
  gap:10px;
}
.choice{
  padding:13px 14px;
  border-radius:16px;
  border:1px solid var(--border);

  font-weight:900;
  text-align:left;
  cursor:pointer;

.choice:hover{

.choice.spicy{

.choice.selected.fun{

.choice.selected.spicy{

.choice.selected.random{

.choiceMeta{

.hintRow{

  color:var(--muted);
  margin-top:10px;

.btnRow{

.btn{

/* small screens */
@media (max-width: 480px){
  .stage{ height:640px; }

  .actionText{ font-size:16px; }

</style>
</head>

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function randomFrom(array){
  return array[Math.floor(Math.random() * array.length)];
}

function setMeta(){
  meta.textContent = `${cardCount} cards played`;
  progressFill.style.width = `${(cardCount % 20) * 5}%`;
}

function getRandomType(){
  return randomFrom(["friendly", "fun", "spicy"]);
}

function getNextAction(type){
  let chosenType = type;
  if (type === "random") {
    chosenType = getRandomType();
  }

  const item = randomFrom(ACTIONS[chosenType]);
  return {
    view: "action",
    type: chosenType,
    displayCategory: item.category,
    text: item.text,
    id: `${Date.now()}-${Math.random().toString(16).slice(2)}`
  };
}

function makeIntroCard(){
  return {
    view: "intro",
    id: "intro-card"
  };
}

function render(cardObj){
  stage.innerHTML = "";
  setMeta();
  stage.appendChild(createCard(cardObj));
}

function createCard(cardObj){
  if (cardObj.view === "intro") return createIntroCard();
  return createActionCard(cardObj);
}

  const cfg = CHOICE_CONFIG[type];

        <div class="choiceTitle">
          <span class="choiceEmoji">${cfg.emoji}</span>
          <span>${escapeHtml(cfg.label)}</span>
        </div>
        <div class="choiceMeta">${escapeHtml(cfg.meta)}</div>
      </div>
    </div>
  `;
}

function wireChoices(card, onSelect){
  card.querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("pointerdown", e => e.stopPropagation());
    btn.addEventListener("touchstart", e => e.stopPropagation(), { passive:true });
    btn.onclick = () => {
      card.querySelectorAll(".choice").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      onSelect(btn.dataset.type);
    };
  });
}

  if (history.length === 0) {
    goToInstructions();
    return;

  currentCard = history[history.length - 1];
  nextType = null;
  render(currentCard);

    card.style.transform = `translateX(${dx}px) rotate(${dx/20}deg)`;
  });

  function resetCard(){
    card.style.transition = "transform .18s ease";
    card.style.transform = "translateX(0) rotate(0deg)";
  }

  function endGesture(){
    if (!dragging) return;
    dragging = false;

    if (dx > SWIPE_THRESHOLD) {
      if (!nextType) {
        resetCard();
        return;
      }
      animLock = true;
      card.style.transition = "transform .14s ease";
      card.style.transform = `translateX(${EXIT_DISTANCE}px) rotate(18deg)`;
      setTimeout(() => {
        animLock = false;
        onRight();
      }, EXIT_MS);
    } else if (dx < -SWIPE_THRESHOLD) {
      if (isIntroCard && history.length === 0) {
        resetCard();
        return;
      }
      animLock = true;
      card.style.transition = "transform .14s ease";
      card.style.transform = `translateX(-${EXIT_DISTANCE}px) rotate(-18deg)`;
      setTimeout(() => {
        animLock = false;
        goBack();
      }, EXIT_MS);
    } else {
      resetCard();
    }
  }

  card.addEventListener("pointerup", endGesture);
  card.addEventListener("pointercancel", () => {
    dragging = false;
    resetCard();
  });
  card.addEventListener("lostpointercapture", endGesture);
}

logoBtn.addEventListener("click", () => {
  goToInstructions();
});

currentCard = makeIntroCard();
render(currentCard);
</script>
</body>
